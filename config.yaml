# =============================================================================
# intern-alert config
# =============================================================================
# Secrets are NOT here. Set them as environment variables / GitHub secrets:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, (optional) DISCORD_WEBHOOK_URL
#
# HOW TO VERIFY A COMPANY'S ATS (do this once per company):
#   Open the company's careers page, click any job, look at the apply-URL host:
#     boards.greenhouse.io/<token>   -> ats: greenhouse,  token: <token>
#     jobs.lever.co/<token>          -> ats: lever,        token: <token>
#     jobs.ashbyhq.com/<token>       -> ats: ashby,        token: <token>
#     anything else (own portal)     -> ats: custom  (see big-tech section)
#   Then run:  python intern_alert.py --dry-run   to confirm it returns jobs.
# =============================================================================

filters:
  # A posting's title must contain at least one of these (case-insensitive).
  # Leave [] to match ALL titles (rely on intern_terms instead).
  role_keywords:
    - product manager
    - product management
    - apm
    - associate product
    - product strategy
    - product operations
    - strategy & operations
    - strategy and operations
    - business operations
    - biz ops
    - venture capital
    - vc intern
    - founder associate
    - founding associate
    - chief of staff
    - 


  # Require an internship signal in the title. Keeps precision high.
  require_intern_term: true
  intern_terms:
    - summer intern
    - intern
    - internship
    - co-op
    - co op
    - coop
    - apprentice
    - summer 2027
    - summer 

  # Reject if the title contains any of these (kills senior/FT false positives).
  # Keep this list free of substrings that appear in roles you WANT.
  exclude_keywords:
    - senior
    - principal
    - director
    - "manager," # avoid "Engineering Manager," etc. (comma guards "Product Manager")

  # Location filtering is OFF by default: a wrongly-dropped US role (a missed
  # opportunity) is worse than a couple of extra pings. Flip to false and edit
  # the list only if you start getting too many irrelevant geos.
  allow_anywhere: true
  locations:
    - united states
    - usa
    - remote
    - new york
    - san francisco
    - california
    - seattle
    - boston

# =============================================================================
# Tier 1 — Public ATS feeds (stable, near-zero maintenance)
# Every token below is a BEST GUESS — verify each with --dry-run (see header).
# =============================================================================
companies:
  # --- Spotify: TOP PRIORITY ------------------------------------------------
  # Spotify's careers site (lifeatspotify.com) is powered by Lever. Its intern
  # roles are titled by area ("2027 Summer Internship, Engineering & Data
  # Science"), NOT "Product Manager Intern" — so we OVERRIDE role_keywords to []
  # here, meaning: alert on EVERY Spotify posting that looks like an internship.
  # Recall beats precision for your #1 company with a hard fall deadline.
  - name: Spotify
    ats: lever
    token: spotify
    filters:
      role_keywords: []        # catch all intern roles, you filter by reading

  # --- Fintech / AI / product startups (verify tokens) ----------------------
  - { name: Stripe,     ats: greenhouse, token: stripe }      # VERIFY
  - { name: Anthropic,  ats: greenhouse, token: anthropic }   # VERIFY
  - { name: Databricks, ats: greenhouse, token: databricks }  # VERIFY
  - { name: Airbnb,     ats: greenhouse, token: airbnb }      # VERIFY
  - { name: Brex,       ats: greenhouse, token: brex }        # VERIFY
  - { name: Notion,     ats: greenhouse, token: notion }      # VERIFY
  - { name: OpenAI,     ats: ashby,      token: openai }      # VERIFY
  - { name: Ramp,       ats: ashby,      token: ramp }        # VERIFY
  - { name: Figma,      ats: ashby,      token: figma }       # VERIFY
  - { name: Snowflake,  ats: ashby,      token: snowflake }   # VERIFY

  # ===========================================================================
  # Tier 2 — Big-tech in-house portals (BEST-EFFORT, undocumented, may break)
  # ---------------------------------------------------------------------------
  # These hit each portal's internal search API. The exact request can change
  # without notice and some block datacenter IPs. If one stops returning jobs:
  #   1) you'll get a "source failed" alert,
  #   2) re-capture its request (README: "Capturing a portal endpoint"),
  #   3) lean on your LinkedIn saved search for that company meanwhile.
  # ===========================================================================

  # Amazon — amazon.jobs has a JSON search endpoint (most stable of the four).
  - name: Amazon
    ats: custom
    request:
      method: GET
      url: https://www.amazon.jobs/en/search.json
      params:
        result_limit: 100
        sort: recent
        "category[]": student-programs
        base_query: intern
      headers: {}
      json_body: null
    map:
      jobs_path: jobs
      id: id_icims
      title: title
      location: normalized_location
      url: job_path
      url_prefix: https://www.amazon.jobs

  # Google — careers.google.com backend. VERIFY/re-capture the request shape.
  - name: Google
    ats: custom
    request:
      method: GET
      url: https://careers.google.com/api/v3/search/
      params:
        q: intern
        page_size: 100
        employment_type: INTERN
      headers: {}
      json_body: null
    map:
      jobs_path: jobs
      id: id
      title: title
      location: locations.0.display
      url: apply_url
      url_prefix: ""

  # Microsoft — gcsservices.careers.microsoft.com. VERIFY/re-capture.
  - name: Microsoft
    ats: custom
    request:
      method: GET
      url: https://gcsservices.careers.microsoft.com/search/api/v1/search
      params:
        q: intern
        l: en_us
        pageSize: 50
        flt: "true"
      headers: {}
      json_body: null
    map:
      jobs_path: operationResult.result.jobs
      id: jobId
      title: title
      location: properties.locations.0
      url_prefix: https://jobs.careers.microsoft.com/global/en/job/
      url: jobId

  # Meta — metacareers.com uses a GraphQL POST with a rotating doc_id. This is
  # the most fragile; it most often needs a fresh DevTools capture or a browser.
  # Until you capture it, rely on your LinkedIn saved search for Meta.
  - name: Meta
    ats: custom
    request:
      method: POST
      url: https://www.metacareers.com/graphql
      params: {}
      headers:
        content-type: application/x-www-form-urlencoded
      json_body: null     # GraphQL needs form-encoded vars — capture from DevTools
    map:
      jobs_path: data.job_search
      id: id
      title: title
      location: locations.0
      url_prefix: https://www.metacareers.com/jobs/
      url: id

# Reminder: Google, Meta, Microsoft, Amazon ALSO need a LinkedIn saved search
# each (README step 7). That's your guaranteed net if a portal adapter breaks.
